<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Car Price Predictor</h1>
    <p class="subtitle">Enter vehicle details to estimate its value</p>

    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="year">Manufacture Year</label>
            <input type="number" id="year" name="year" required min="1990" max="2025" placeholder="e.g. 2018" value="{{ year if year else '' }}">
        </div>

        <div class="form-group">
            <label for="mileage">Mileage (miles)</label>
            <input type="number" id="mileage" name="mileage" required min="0" placeholder="e.g. 45000" value="{{ mileage if mileage else '' }}">
        </div>

        <div class="form-group">
            <label for="engine_size">Engine Size (L)</label>
            <input type="number" step="0.1" id="engine_size" name="engine_size" required min="0.5" max="8.0" placeholder="e.g. 2.0" value="{{ engine_size if engine_size else '' }}">
        </div>

        <div class="form-group">
            <label for="horsepower">Horsepower (HP)</label>
            <input type="number" id="horsepower" name="horsepower" required min="50" max="1500" placeholder="e.g. 150" value="{{ horsepower if horsepower else '' }}">
        </div>

        <button type="submit">Predict Price</button>
    </form>

    {% if predicted_price %}
    <div class="result">
        <h3>Estimated Value</h3>
        <div class="price">{{ predicted_price }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
